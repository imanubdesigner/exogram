name: Deploy

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

env:
  NODE_VERSION: '20'

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main') }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: https://${{ secrets.APP_DOMAIN }}
        run: |
          npm ci
          npm run build

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Trust deploy host
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Render root env
        run: |
          mkdir -p .deploy
          # <<'EOF' evita que bash interprete $ en valores de secretos.
          # GitHub Actions expande los secrets antes de que el shell corra.
          cat > .deploy/root.env <<'EOF'
          APP_DOMAIN=${{ secrets.APP_DOMAIN }}
          ACME_EMAIL=${{ secrets.ACME_EMAIL }}
          SENTRY_DSN=${{ secrets.SENTRY_DSN }}
          POSTGRES_DB=${{ secrets.POSTGRES_DB }}
          POSTGRES_USER=${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          POSTAL_DB_ROOT_PASSWORD=${{ secrets.POSTAL_DB_ROOT_PASSWORD }}
          POSTAL_DB_PASSWORD=${{ secrets.POSTAL_DB_PASSWORD }}
          POSTAL_RAILS_SECRET_KEY=${{ secrets.POSTAL_RAILS_SECRET_KEY }}
          EOF

      - name: Render backend env
        run: |
          mkdir -p .deploy
          cat > .deploy/backend.env <<'EOF'
          SECRET_KEY=${{ secrets.SECRET_KEY }}
          DEBUG=False
          ALLOWED_HOSTS=${{ secrets.ALLOWED_HOSTS }}
          ADMIN_URL=${{ secrets.ADMIN_URL }}
          FORCE_HTTPS=${{ secrets.FORCE_HTTPS }}
          DJANGO_SETTINGS_MODULE=${{ secrets.DJANGO_SETTINGS_MODULE }}
          POSTGRES_DB=${{ secrets.POSTGRES_DB }}
          POSTGRES_USER=${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          DB_HOST=${{ secrets.DB_HOST }}
          DB_PORT=${{ secrets.DB_PORT }}
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          REDIS_URL=${{ secrets.REDIS_URL }}
          CELERY_BROKER_URL=${{ secrets.CELERY_BROKER_URL }}
          CELERY_RESULT_BACKEND=${{ secrets.CELERY_RESULT_BACKEND }}
          JWT_ACCESS_TOKEN_MINUTES=${{ secrets.JWT_ACCESS_TOKEN_MINUTES }}
          JWT_REFRESH_TOKEN_DAYS=${{ secrets.JWT_REFRESH_TOKEN_DAYS }}
          JWT_ACCESS_COOKIE_NAME=${{ secrets.JWT_ACCESS_COOKIE_NAME }}
          JWT_REFRESH_COOKIE_NAME=${{ secrets.JWT_REFRESH_COOKIE_NAME }}
          JWT_ACCESS_COOKIE_PATH=${{ secrets.JWT_ACCESS_COOKIE_PATH }}
          JWT_REFRESH_COOKIE_PATH=${{ secrets.JWT_REFRESH_COOKIE_PATH }}
          JWT_COOKIE_SECURE=${{ secrets.JWT_COOKIE_SECURE }}
          JWT_COOKIE_SAMESITE=${{ secrets.JWT_COOKIE_SAMESITE }}
          JWT_COOKIE_DOMAIN=${{ secrets.JWT_COOKIE_DOMAIN }}
          CORS_ALLOWED_ORIGINS=${{ secrets.CORS_ALLOWED_ORIGINS }}
          CSRF_TRUSTED_ORIGINS=${{ secrets.CSRF_TRUSTED_ORIGINS }}
          FRONTEND_BASE_URL=${{ secrets.FRONTEND_BASE_URL }}
          OPENLIBRARY_API_URL=${{ secrets.OPENLIBRARY_API_URL || 'https://openlibrary.org/api' }}
          PASSWORD_RESET_TOKEN_TTL_HOURS=${{ secrets.PASSWORD_RESET_TOKEN_TTL_HOURS || '2' }}
          EMAIL_BACKEND=${{ secrets.EMAIL_BACKEND }}
          EMAIL_HOST=${{ secrets.EMAIL_HOST }}
          EMAIL_PORT=${{ secrets.EMAIL_PORT }}
          EMAIL_HOST_USER=${{ secrets.EMAIL_HOST_USER }}
          EMAIL_HOST_PASSWORD=${{ secrets.EMAIL_HOST_PASSWORD }}
          EMAIL_USE_TLS=${{ secrets.EMAIL_USE_TLS }}
          EMAIL_USE_SSL=${{ secrets.EMAIL_USE_SSL }}
          DEFAULT_FROM_EMAIL=${{ secrets.DEFAULT_FROM_EMAIL }}
          SENTRY_DSN=${{ secrets.SENTRY_DSN }}
          EOF

      - name: Ensure deploy path exists
        run: |
          ssh "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" "mkdir -p '${{ secrets.DEPLOY_PATH }}/backend'"

      - name: Rsync repository
        run: |
          rsync -az --delete \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude ".deploy/" \
            --exclude ".env" \
            --exclude "backend/.env" \
            --exclude "frontend/node_modules/" \
            "${GITHUB_WORKSPACE}/" \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/"

      - name: Upload env files
        run: |
          rsync -az .deploy/root.env "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/.env"
          rsync -az .deploy/backend.env "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/backend/.env"

      - name: Deploy on server
        run: |
          ssh "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" <<EOF
          set -euo pipefail
          cd "${{ secrets.DEPLOY_PATH }}"
          docker compose -f docker-compose.yml -f docker-compose.prod.yml build
          docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
          docker compose exec -T backend python manage.py migrate --noinput
          docker compose exec -T backend python manage.py collectstatic --noinput
          curl -fsS http://127.0.0.1:8000/api/health/ >/dev/null
          EOF
